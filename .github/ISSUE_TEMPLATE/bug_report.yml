name: Bug Report
description: Report a bug
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What happened? What did you expect?
      placeholder: |
        Describe the bug clearly. Include:
        - What you were doing
        - What you expected
        - What actually happened
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      options:
        - Docker
        - Compiled from source
        - Pre-built binary
        - Not applicable
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "e.g., 0.1.0 or commit SHA"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
    validations:
      required: false

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start with ...
        2. Run ...
        3. Observe ...
    validations:
      required: false
