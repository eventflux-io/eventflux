name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  # Disable incremental compilation to save disk space
  CARGO_INCREMENTAL: 0
  # Reduce debuginfo to save disk space
  RUSTFLAGS: "-C debuginfo=0"

jobs:
  pr-title:
    name: PR Title Convention
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017  # v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert

  ci:
    name: Quality, Build & Test
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      rabbitmq:
        image: rabbitmq:3-alpine
        options: >-
          --health-cmd "rabbitmq-diagnostics -q check_running"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5672:5672

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      with:
        submodules: recursive

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        df -h

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
      with:
        toolchain: 1.85
        components: rustfmt, clippy

    - name: Cache cargo registry and target
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: |
          ~/.cargo/bin
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Run clippy
      # Note: Not using --all-features because cloud-native features (kubernetes, consul,
      # etcd, vault) require external system dependencies not available in CI.
      run: cargo clippy --all-targets --features connectors-all -- -D warnings -A clippy::nursery

    - name: Check per-connector feature gating
      # Each connector alone (including test code) — catches missing #[cfg]s
      # and accidental cross-feature dependencies.
      run: |
        cargo check --all-targets --features rabbitmq
        cargo check --all-targets --features websocket

    - name: Check typos
      uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89  # v1.47.2

    - name: Install tools
      uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912  # v2
      with:
        tool: cargo-machete,cargo-sort,cargo-nextest,taplo-cli

    - name: Check unused dependencies
      run: cargo machete

    - name: Check dependency sorting
      run: cargo sort --workspace --check

    - name: Check TOML formatting
      run: taplo fmt --check

    - name: Run tests
      run: cargo nextest run --features connectors-all --verbose

    - name: Run tests (minimal build, no connectors)
      # The advertised lightweight baseline must not just compile — its test
      # suite (including cfg(not(feature))-gated tests like the
      # unavailable-extension hint) must pass.
      run: cargo nextest run --verbose

    - name: Run RabbitMQ integration tests
      run: cargo nextest run --features rabbitmq --test rabbitmq_integration --run-ignored ignored-only --verbose

    - name: Run doctests
      run: cargo test --doc --features connectors-all

    - name: Run vendor parser tests
      run: cargo test --verbose
      working-directory: vendor/datafusion-sqlparser-rs
